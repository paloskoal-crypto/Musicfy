name: Build Musicfy IPA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS app
        run: |
          xcodebuild \
            -project Musicfy.xcodeproj \
            -scheme Musicfy \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/DerivedData/Build/Products/Release-iphoneos/Musicfy.app build/ipa/Payload/
          
          # Remove code signature (critical for sideloading)
          rm -rf build/ipa/Payload/Musicfy.app/_CodeSignature
          rm -f build/ipa/Payload/Musicfy.app/embedded.mobileprovision
          
          cd build/ipa
          zip -qry ../Musicfy-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Musicfy-unsigned-ipa
          path: build/Musicfy-unsigned.ipa
