name: Build Musicfy IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build (simple, verbose errors)
        run: |
          xcodebuild \
            -project Musicfy.xcodeproj \
            -scheme Musicfy \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build 2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "=== Showing errors from build.log ==="
            grep -A 5 "error:" build.log || cat build.log | tail -300
            exit $BUILD_EXIT_CODE
          fi

      - name: Find and package app
        if: success()
        run: |
          echo "=== Finding Musicfy.app ==="
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Musicfy.app" -type d | head -1)
          
          if [ -z "$APP" ]; then
            echo "Error: Musicfy.app not found"
            exit 1
          fi
          
          echo "Found app at: $APP"
          ls -la "$APP"
          
          # Create proper IPA structure
          mkdir -p Payload
          cp -r "$APP" Payload/
          
          # Remove code signature (for sideloading)
          rm -rf "Payload/Musicfy.app/_CodeSignature" || true
          rm -f "Payload/Musicfy.app/embedded.mobileprovision" || true
          
          # Create IPA
          zip -r Musicfy-unsigned.ipa Payload/
          
          echo "=== IPA Structure ==="
          unzip -l Musicfy-unsigned.ipa | head -30
          echo "=== IPA Info ==="
          ls -lh Musicfy-unsigned.ipa
          
          # Verify bundle ID
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "Payload/Musicfy.app/Info.plist" || echo "No bundle ID found"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            build.log
            build/reports/
          retention-days: 7

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Musicfy-${{ github.run_number }}
          path: Musicfy-unsigned.ipa
          retention-days: 30
