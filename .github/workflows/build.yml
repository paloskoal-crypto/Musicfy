name: Build Musicfy IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build (simple, verbose errors)
        run: |
          xcodebuild \
            -project Musicfy.xcodeproj \
            -scheme Musicfy \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build 2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "=== Showing errors from build.log ==="
            grep -A 5 "error:" build.log || cat build.log | tail -300
            exit $BUILD_EXIT_CODE
          fi

      - name: Find and package app
        if: success()
        run: |
          find . -name "Musicfy.app" -type d
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Musicfy.app" -type d | head -1)
          if [ -n "$APP" ]; then
            mkdir Payload
            cp -r "$APP" Payload/
            zip -r Musicfy-unsigned.ipa Payload/
            ls -lh Musicfy-unsigned.ipa
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            build.log
            build/reports/
          retention-days: 7

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Musicfy-${{ github.run_number }}
          path: Musicfy-unsigned.ipa
          retention-days: 30
